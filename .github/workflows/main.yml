name: Build PlotCore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: mvn package -f PlotCore/pom.xml

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: PlotCore
          path: PlotCore/target/PlotCore-*.jar
